<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexor — OSINT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #000000;
      --surface: #0a0a0a;
      --border:  #1c1c1c;
      --border2: #2e2e2e;
      --white:   #ffffff;
      --grey1:   #a0a0a0;
      --grey2:   #555555;
      --grey3:   #282828;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--grey1);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .15s, height .15s;
    }
    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid var(--grey2);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, border-color .2s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 1;
    }

    main {
      position: relative;
      z-index: 10;
      max-width: 820px;
      margin: 0 auto;
      padding: 72px 36px 120px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 96px;
      opacity: 0;
      animation: fadeUp .5s .05s forwards;
    }
    .topbar-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey2);
      letter-spacing: .15em;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey1);
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--white);
      border-radius: 50%;
      animation: pulse 2.4s infinite;
    }

    .hero { margin-bottom: 72px; }

    .hero-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey2);
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp .5s .15s forwards;
    }

    .hero-name {
      font-size: clamp(80px, 14vw, 130px);
      font-weight: 800;
      line-height: .88;
      letter-spacing: -.04em;
      color: var(--white);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp .6s .25s forwards;
    }

    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      color: var(--white);
      overflow: hidden;
    }
    .glitch::before {
      clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
      transform: translateX(-3px);
      opacity: 0;
      animation: glitch1 5s infinite;
    }
    .glitch::after {
      clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
      transform: translateX(3px);
      opacity: 0;
      animation: glitch2 5s infinite;
    }

    .hero-desc {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--grey2);
      line-height: 1.9;
      max-width: 460px;
      opacity: 0;
      animation: fadeUp .5s .4s forwards;
    }
    .hero-desc em {
      font-style: normal;
      color: var(--grey1);
    }
    .blink {
      animation: blink 1s step-end infinite;
      color: var(--white);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 56px 0;
      opacity: 0;
      animation: fadeUp .4s .5s forwards;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey2);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp .4s .55s forwards;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp .5s .6s forwards;
    }
    .tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey1);
      border: 1px solid var(--border2);
      padding: 5px 13px;
      background: transparent;
      letter-spacing: .06em;
      transition: border-color .2s, color .2s, background .2s;
      cursor: default;
    }
    .tag:hover {
      border-color: var(--grey1);
      color: var(--white);
      background: var(--grey3);
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      animation: fadeUp .5s .7s forwards;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      padding: 18px 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .contact-item::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--white);
      transform: scaleY(0);
      transition: transform .2s;
      transform-origin: bottom;
    }
    .contact-item:hover { border-color: var(--grey2); background: var(--grey3); }
    .contact-item:hover::after { transform: scaleY(1); }

    .contact-icon {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--grey1);
      width: 20px;
      flex-shrink: 0;
      transition: color .2s;
    }
    .contact-item:hover .contact-icon { color: var(--white); }

    .contact-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--grey2);
      letter-spacing: .15em;
      width: 80px;
      flex-shrink: 0;
    }
    .contact-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--grey1);
      transition: color .2s;
    }
    .contact-item:hover .contact-value { color: var(--white); }

    .contact-arrow {
      margin-left: auto;
      font-size: 13px;
      color: var(--grey2);
      transition: color .2s, transform .2s;
    }
    .contact-item:hover .contact-arrow { color: var(--white); transform: translateX(4px); }

    footer {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px 36px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--grey2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .2; }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes glitch1 {
      0%,88%,100% { opacity: 0; transform: translateX(0); }
      90%  { opacity: .6; transform: translateX(-4px); }
      92%  { opacity: .6; transform: translateX(3px); }
      94%  { opacity: 0; }
    }
    @keyframes glitch2 {
      0%,88%,100% { opacity: 0; transform: translateX(0); }
      91%  { opacity: .4; transform: translateX(4px); }
      93%  { opacity: .4; transform: translateX(-3px); }
      95%  { opacity: 0; }
    }

    @media (max-width: 600px) {
      main { padding: 40px 20px 80px; }
      .topbar { margin-bottom: 56px; }
      .contact-label { display: none; }
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<main>
  <div class="topbar">
    <span class="topbar-tag">// nexor</span>
    <span class="status"><span class="status-dot"></span>available</span>
  </div>

  <section class="hero">
    <p class="hero-label">// identity</p>
    <h1 class="hero-name"><span class="glitch" data-text="NEXOR">NEXOR</span></h1>
        <p class="hero-desc">
      Control can sometimes be an illusion.<span class="blink">_</span>
    </p>
  </section>

  <div class="divider"></div>

  <p class="section-title">// специализация</p>
  <div class="tags">
    <span class="tag">OSINT</span>
    <span class="tag">Разведка</span>
    <span class="tag">Анализ данных</span>
    <span class="tag">Цифровые следы</span>
    <span class="tag">Социальная инженерия</span>
    <span class="tag">Поиск людей</span>
  </div>

  <p class="section-title">// контакты</p>
  <div class="contacts">
    <a class="contact-item" href="https://t.me/Bt5iCTkl2g" target="_blank" rel="noopener">
      <span class="contact-icon">✈</span>
      <span class="contact-label">TELEGRAM</span>
      <span class="contact-value">@Bt5iCTkl2g</span>
      <span class="contact-arrow">→</span>
    </a>
  </div>
</main>

<footer>
  <span>© 2026 NEXOR</span>
  <span style="color:#1c1c1c">·</span>
  <span>OSINT</span>
  <span style="color:#1c1c1c">·</span>
  <span>Fuck your rights</span>
</footer>

<script>
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;

  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cursor.style.left=mx+'px'; cursor.style.top=my+'px';
  });

  (function loop(){
    rx+=(mx-rx)*.11; ry+=(my-ry)*.11;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();

  document.querySelectorAll('a,.tag').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      cursor.style.width='14px'; cursor.style.height='14px';
      ring.style.width='46px'; ring.style.height='46px';
      ring.style.borderColor='#a0a0a0';
    });
    el.addEventListener('mouseleave',()=>{
      cursor.style.width='8px'; cursor.style.height='8px';
      ring.style.width='32px'; ring.style.height='32px';
      ring.style.borderColor='#555555';
    });
  });
</script>
</body>
</html>
